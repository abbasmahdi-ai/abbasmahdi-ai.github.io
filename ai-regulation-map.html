<style>
/* ── Wikipedia Vector 2022 Design System ─────────────────────────── */
:root {
  --bg: #ffffff;
  --bg-content: #ffffff;
  --bg-sidebar: #f8f9fa;
  --bg-infobox: #f8f9fa;
  --bg-hover: #eaf3ff;
  --border: #d4d5d9;
  --border-light: #eaecf0;
  --border-blue: #72acf7;
  --text: #202122;
  --text-sub: #36454f;
  --text-muted: #54595d;
  --text-dim: #72777d;
  --text-link: #3366cc;
  --accent: #3366cc;
  --accent-hover: #2a55a5;
  --green: #096450;
  --green-bg: #d5fdf4;
  --amber: #783f04;
  --amber-bg: #fef3c7;
  --red: #b32424;
  --red-bg: #fee7e6;
  --purple: #4e2a84;
  --purple-bg: #ede7f6;
  --radius: 2px;
  --font: -apple-system, 'Linux Libertine', Georgia, Times, serif;
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

[data-theme="dark"] {
  --bg: #11131a;
  --bg-content: #11131a;
  --bg-sidebar: #1a1d24;
  --bg-infobox: #1e2229;
  --bg-hover: #1e2d45;
  --border: #3a3d45;
  --border-light: #2a2d36;
  --border-blue: #4a6fa8;
  --text: #eaecf0;
  --text-sub: #c8ccd1;
  --text-muted: #a2a9b1;
  --text-dim: #72777d;
  --text-link: #6ea8fe;
  --accent: #6ea8fe;
  --accent-hover: #4a84d8;
  --green: #4ac79a;
  --green-bg: #0d2b24;
  --amber: #f5c06a;
  --amber-bg: #2a1f0c;
  --red: #f87171;
  --red-bg: #2a0f0f;
  --purple: #b39ddb;
  --purple-bg: #1e1630;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Topbar ─────────────────────────────────────────────────────── */
.rai-topbar {
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.rai-topbar-brand {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: .3px;
}
.rai-topbar-center {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  max-width: 360px;
  margin: 0 20px;
}
.rai-topbar-actions { display: flex; gap: 8px; align-items: center; }
.rai-btn-small {
  background: var(--bg-content);
  border: 1px solid var(--border);
  color: var(--text-sub);
  border-radius: var(--radius);
  padding: 3px 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font-ui);
  transition: background .12s, border-color .12s;
}
.rai-btn-small:hover { background: var(--bg-hover); border-color: var(--border-blue); }
.rai-btn-small.active {
  background: var(--bg-hover);
  border-color: var(--border-blue);
  color: var(--text-link);
  font-weight: 600;
}

/* ── Search input ────────────────────────────────────────────────── */
.rai-search {
  flex: 1;
  background: var(--bg-content);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 10px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  font-family: var(--font-ui);
  transition: border-color .12s, box-shadow .12s;
}
.rai-search:focus { border-color: var(--accent); box-shadow: 0 0 0 2px #3366cc22; }

/* ── Layout ─────────────────────────────────────────────────────── */
.rai-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  max-width: 1380px;
  margin: 0 auto;
  min-height: calc(100vh - 44px);
  gap: 0;
}

/* ── Filter TOC Sidebar ──────────────────────────────────────────── */
.rai-toc {
  border-right: 1px solid var(--border-light);
  padding: 20px 0 40px;
  position: sticky;
  top: 44px;
  height: calc(100vh - 44px);
  overflow-y: auto;
}
.rai-toc::-webkit-scrollbar { width: 4px; }
.rai-toc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.rai-toc-heading {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--text-dim);
  padding: 0 16px;
  margin-bottom: 8px;
}
.rai-toc-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--text-dim);
  padding: 10px 16px 5px;
  display: block;
}
.rai-toc-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  cursor: pointer;
  color: var(--text-sub);
  font-size: 12.5px;
  border-left: 3px solid transparent;
  transition: all .1s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font-ui);
}
.rai-toc-item:hover { background: var(--bg-hover); color: var(--text-link); }
.rai-toc-item.active {
  border-left-color: var(--accent);
  background: var(--bg-hover);
  color: var(--text-link);
  font-weight: 600;
}
.rai-toc-count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.rai-toc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.rai-toc-divider {
  border: none;
  border-top: 1px solid var(--border-light);
  margin: 10px 16px;
}

/* ── Main Content ────────────────────────────────────────────────── */
.rai-main {
  padding: 24px 32px 60px;
  min-width: 0;
}

/* ── Page heading ────────────────────────────────────────────────── */
.rai-page-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-hover);
  border: 1px solid var(--border-blue);
  border-radius: var(--radius);
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-link);
  letter-spacing: .3px;
  margin-bottom: 10px;
}
.rai-page-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 6px;
  font-family: var(--font-ui);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}
.rai-page-lead {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 6px;
}
.rai-page-asof {
  display: inline-block;
  font-size: 11px;
  color: var(--text-dim);
  background: var(--bg-infobox);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 3px 9px;
  margin-bottom: 22px;
  letter-spacing: .2px;
}

/* ── Regulation card ─────────────────────────────────────────────── */
.reg-card {
  background: var(--bg-content);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border-light);
  border-radius: var(--radius);
  padding: 12px 15px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .13s;
  animation: fade-in 0.18s ease;
}
.reg-card:hover {
  background: var(--bg-hover);
  border-left-color: var(--accent);
}
.reg-card.selected {
  background: var(--bg-hover);
}

/* ── Detail panel ────────────────────────────────────────────────── */
.reg-detail {
  width: 460px;
  flex-shrink: 0;
  max-height: calc(100vh - 108px);
  overflow-y: auto;
  background: var(--bg-infobox);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: sticky;
  top: 68px;
}
.reg-detail::-webkit-scrollbar { width: 4px; }
.reg-detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Detail section heading ──────────────────────────────────────── */
.det-section-title {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 7px;
  font-family: var(--font-ui);
}

/* ── Callouts ────────────────────────────────────────────────────── */
.rai-callout-red {
  background: var(--red-bg);
  border-left: 3px solid var(--red);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 9px 13px;
}
.rai-callout-blue {
  background: var(--bg-infobox);
  border-left: 3px solid var(--border);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 9px 13px;
}

/* ── Timeline ────────────────────────────────────────────────────── */
.rai-timeline-wrap {
  background: var(--bg-infobox);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  overflow-x: auto;
}

/* ── Status badge ────────────────────────────────────────────────── */
.rai-badge {
  display: inline-block;
  border-radius: var(--radius);
  font-weight: 700;
  letter-spacing: .04em;
  font-family: var(--font-ui);
  line-height: 1;
}

/* ── View toggle ─────────────────────────────────────────────────── */
.rai-view-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.rai-view-btn {
  background: var(--bg-content);
  border: none;
  border-right: 1px solid var(--border);
  padding: 4px 14px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font-ui);
  transition: background .1s, color .1s;
}
.rai-view-btn:last-child { border-right: none; }
.rai-view-btn:hover { background: var(--bg-hover); color: var(--text-link); }
.rai-view-btn.active {
  background: var(--bg-hover);
  color: var(--text-link);
  font-weight: 600;
}

/* ── Stats bar ───────────────────────────────────────────────────── */
.stat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.stat-bar-track { flex: 1; height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
.stat-bar-fill  { height: 100%; border-radius: 2px; }

/* ── Animations ──────────────────────────────────────────────────── */
@keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slide-in { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

/* ── RTL support ─────────────────────────────────────────────────── */
[dir="rtl"] .rai-toc {
  border-right: none;
  border-left: 1px solid var(--border-light);
}
[dir="rtl"] .rai-toc-item {
  text-align: right;
  border-left: none;
  border-right: 3px solid transparent;
}
[dir="rtl"] .rai-toc-item.active,
[dir="rtl"] .rai-toc-item:hover {
  border-right-color: var(--accent);
}
[dir="rtl"] .rai-callout-red,
[dir="rtl"] .rai-callout-blue {
  border-left: none;
  border-right: 3px solid var(--red);
}
[dir="rtl"] .rai-callout-blue { border-right-color: var(--border); }
[dir="rtl"] .reg-card { border-left: 1px solid var(--border); border-right: 3px solid var(--border-light); }
[dir="rtl"] .reg-card:hover,
[dir="rtl"] .reg-card.selected { border-right-color: var(--accent); }
[dir="rtl"] .rai-toc-count { margin-left: 0; margin-right: auto; }

/* ── Mobile ──────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .rai-layout { grid-template-columns: 1fr; }
  .rai-toc { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border-light); padding: 14px 0; }
  .rai-main { padding: 16px 16px 40px; }
  .reg-detail { width: 100%; position: static; max-height: none; padding: 16px; }
  .rai-topbar-center { display: none; }
}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.skip-link{position:absolute;top:-40px;left:0;background:var(--accent);color:#fff;padding:8px 14px;z-index:300;text-decoration:none;border-radius:var(--radius)}
.skip-link:focus{top:0}
/* ── Map view ────────────────────────────────────────────────────── */
.map-wrap {
  background: var(--bg-infobox);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
#world-map {
  width: 100%;
  height: auto;
  display: block;
  max-height: 540px;
}
#world-map .country {
  stroke: var(--border-light);
  stroke-width: 0.4;
  transition: fill .13s, stroke .13s, stroke-width .13s;
}
#world-map .country.other {
  fill: #d1d5db;
  stroke: #6b7280;
  stroke-width: 0.5;
  cursor: default;
}
[data-theme="dark"] #world-map .country.other {
  fill: #3f4550;
  stroke: #5a6070;
}
#world-map .country.mapped {
  cursor: pointer;
}
/* Hover/selection styling is set inline by applyMapStyles(); keep CSS minimal. */
#world-map .country.microstate {
  stroke-width: 0.9;
}
#map-tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--bg-content);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius);
  padding: 7px 11px;
  font-size: 12px;
  color: var(--text);
  box-shadow: 0 2px 6px rgba(0,0,0,.12);
  display: none;
  z-index: 50;
  white-space: nowrap;
  animation: fade-in 0.1s ease;
}
#map-tooltip .tt-name { font-weight: 600; font-size: 12.5px; }
#map-tooltip .tt-region { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
#map-tooltip .tt-count { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; letter-spacing: .3px; }
[dir="rtl"] #map-tooltip { border-left: 1px solid var(--border); border-right: 3px solid var(--accent); }
.map-caption {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  margin: 4px 0 12px;
}
</style>

    summary: "South Africa's principal data protection statute, assented to on 19 November 2013 and brought into operation in stages, with substantive provisions commencing 1 July 2020 and a one-year grace period making enforcement effective from 1 July 2021. Administered by the Information Regulator, it establishes eight conditions for lawful processing and contains explicit AI-relevant controls — most notably Section 71, which restricts decisions based solely on automated processing that have legal or substantially similar effects on data subjects.",

      "Mandatory notification of security compromises to the Information Regulator and affected data subjects",
      "Prior authorisation from the Information Regulator required for specified high-risk processing including certain automated decision-making",
      "Appointment of an Information Officer and registration with the Information Regulator",
      "Restrictions on cross-border transfers of personal information to jurisdictions without adequate protection"
    ],
    keyDates: { assented: "Nov 2013", mainCommencement: "Jul 2020", enforcementEffective: "Jul 2021" },

function regionOf(id){ for(var i=0;i<REGIONS.length;i++) if(REGIONS[i].id===id) return REGIONS[i]; return null; }
function topicOf(id){ for(var i=0;i<TOPICS.length;i++) if(TOPICS[i].id===id) return TOPICS[i]; return null; }
function regOf(id){ for(var i=0;i<REGS.length;i++) if(REGS[i].id===id) return REGS[i]; return null; }
function esc(s){
  if(s==null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function hex2a(hex,a){
  // hex like "#rrggbb" — attach 2-digit alpha hex; accept existing 8-hex.
  if(hex.length===9) return hex;
  var aa = Math.round(a*255).toString(16); if(aa.length<2) aa="0"+aa;
  return hex+aa;
}

/* ══════════════════════════════════════════
   FILTER + SORT PIPELINE
══════════════════════════════════════════ */
function getFiltered(){
  var out = [];
  for(var i=0;i<REGS.length;i++){
    var r = REGS[i];
    if(state.selectedRegions.length && state.selectedRegions.indexOf(r.region)===-1) continue;
    if(state.selectedTopics.length){
      var hit = false;
      for(var k=0;k<state.selectedTopics.length;k++){
        if(r.topics.indexOf(state.selectedTopics[k])!==-1){ hit = true; break; }
      }
      if(!hit) continue;
    }
    if(state.selectedStatus.length && state.selectedStatus.indexOf(r.status)===-1) continue;
    if(state.search){
      var q = state.search.toLowerCase();
      var name = state.lang==='ar' && r.ar_name ? r.ar_name : r.name;
      var summ = state.lang==='ar' && r.ar_summary ? r.ar_summary : r.summary;
      var sh   = state.lang==='ar' && r.ar_short ? r.ar_short : r.short;
      if(name.toLowerCase().indexOf(q)===-1 &&
         summ.toLowerCase().indexOf(q)===-1 &&
         sh.toLowerCase().indexOf(q)===-1) continue;
    }
    out.push(r);
  }
  if(state.sortBy==='year'){
    out.sort(function(a,b){ return b.year - a.year; });
  } else if(state.sortBy==='region'){
    var orderMap = {}; for(var j=0;j<REGIONS.length;j++) orderMap[REGIONS[j].id] = j;
    out.sort(function(a,b){
      var ra = orderMap[a.region], rb = orderMap[b.region];
      if(ra!==rb) return ra - rb;
      return b.year - a.year;
    });
  }
  return out;
}

function countBy(key){
  var c = {};
  for(var i=0;i<REGS.length;i++){ var v = REGS[i][key]; c[v] = (c[v]||0)+1; }
  return c;
}

      rHTML += '<button class="rai-related-chip" data-rel-id="'+esc(rr.id)+'" style="background:var(--bg-content);border:1px solid var(--border);border-radius:var(--radius);padding:3px 9px;font-size:11px;color:var(--text-muted);display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-family:var(--font-ui)">' +
        '<span style="width:6px;height:6px;border-radius:50%;background:'+(rg?rg.color:'#999')+';display:inline-block"></span>' +
        esc(sh) +
      '</button>';
    }
    rHTML += '</div>';
    relSec = detailSecHTML(ui.relatedFrameworks, rHTML);
  }

  // Source / last verified footer
  var srcHTML = '';
  if(reg.last_verified || reg.source_url){
    srcHTML = '<div style="margin-top:10px;padding-top:12px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-dim);line-height:1.6">';
    if(reg.last_verified){
      srcHTML += esc(ui.lastVerified)+': '+esc(reg.last_verified);
    }
    if(reg.source_url){
      if(reg.last_verified) srcHTML += ' · ';
      srcHTML += '<a href="'+esc(reg.source_url)+'" target="_blank" rel="noopener noreferrer" style="color:var(--text-link);text-decoration:none">'+esc(ui.viewSource)+' ↗</a>';
    }
    srcHTML += '</div>';
  }

  return '<div style="animation:slide-in 0.2s ease">' +
    header + covSec + sumSec + reqSec + dateSec + penSec + topSec + relSec + srcHTML +
    '</div>';
}

function timelineHTML(regs, lang){
  var minY = 2016, maxY = 2026;
  var years = []; for(var y=minY; y<=maxY; y++) years.push(y);
  var html = '<div class="rai-timeline-wrap"><div style="min-width:800px;position:relative">';
  // Year axis
  html += '<div style="display:flex;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px;padding-left:110px">';
  for(var yi=0; yi<years.length; yi++){
    html += '<div style="flex:1;text-align:center;font-size:11px;color:var(--text-dim);font-weight:600">'+years[yi]+'</div>';
  }
  html += '</div>';
  // Region rows
  for(var ri=0; ri<REGIONS.length; ri++){
    var region = REGIONS[ri];
    var rRegs = regs.filter(function(r){ return r.region===region.id; });
    if(!rRegs.length) continue;
    var regionName = lang==='ar' && region.ar_name ? region.ar_name : region.name;
    var firstWord = regionName.split(' ')[0];
    html += '<div style="display:flex;align-items:center;margin-bottom:12px">' +
      '<div style="width:110px;font-size:11.5px;color:'+region.color+';font-weight:700;flex-shrink:0;display:flex;align-items:center;gap:6px">' +
        '<span style="width:8px;height:8px;border-radius:50%;background:'+region.color+';flex-shrink:0;display:inline-block"></span>'+esc(firstWord) +
      '</div>' +
      '<div style="flex:1;position:relative;height:28px">' +
        '<div style="position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border-light)"></div>';
    for(var rj=0; rj<rRegs.length; rj++){
      var reg = rRegs[rj];
      var pct = ((reg.year - minY) / (maxY - minY)) * 100;
      var s = STATUS_CFG[reg.status] || STATUS_CFG.voluntary;
      var sh = lang==='ar' && reg.ar_short ? reg.ar_short : reg.short;
      var ttl = lang==='ar' && reg.ar_name ? reg.ar_name : reg.name;
      html += '<button data-reg-id="'+esc(reg.id)+'" title="'+esc(ttl)+'" style="position:absolute;left:'+pct+'%;top:50%;transform:translate(-50%,-50%);background:'+s.bg+';border:1px solid '+region.color+';color:'+region.color+';border-radius:var(--radius);padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;z-index:2;font-family:var(--font-ui)">'+esc(sh)+'</button>';
    }
    html += '</div></div>';
  }
  html += '</div></div>';
  return html;
}

function $map(s){ return document.querySelector(s); }
function $$map(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }

function hexA(hex, a){
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

var MAP_BLUE      = '#3b82f6';   // default mono hue
var MAP_BLUE_DEEP = '#1e3a8a';   // hover stroke
var hoveredEl     = null;

function regionById(id){
  for(var i=0;i<REGIONS.length;i++) if(REGIONS[i].id===id) return REGIONS[i];
  return null;
}
function regCountByRegion(rid){
  var n = 0;
  for(var i=0;i<REGS.length;i++) if(REGS[i].region===rid) n++;
  return n;
}

function styleCountry(p, isHover){
  var rid = p.getAttribute('data-region');
  var selArr = state.selectedRegions || [];
  var hasSel = selArr.length > 0;
  var isSelected = hasSel && selArr.indexOf(rid) !== -1;
  var isMicro = p.classList.contains('microstate');
  var fillColor, fillAlpha, strokeColor, strokeWidth;

  if (isSelected) {
    var region = regionById(rid);
    fillColor  = region ? region.color : MAP_BLUE;
    fillAlpha  = isHover ? 0.85 : (isMicro ? 0.9 : 0.55);
    strokeColor = fillColor;
    strokeWidth = isHover ? 1.6 : 1.3;
  } else if (hasSel) {
    fillColor  = MAP_BLUE;
    fillAlpha  = isHover ? 0.45 : (isMicro ? 0.4 : 0.10);
    strokeColor = isHover ? MAP_BLUE_DEEP : MAP_BLUE;
    strokeWidth = isHover ? 1.0 : (isMicro ? 0.9 : 0.5);
  } else {
    fillColor  = MAP_BLUE;
    fillAlpha  = isHover ? 0.6 : (isMicro ? 0.8 : 0.32);
    strokeColor = isHover ? MAP_BLUE_DEEP : MAP_BLUE;
    strokeWidth = isHover ? 1.0 : (isMicro ? 0.9 : 0.6);
  }

  p.style.fill = hexA(fillColor, fillAlpha);
  p.style.stroke = strokeColor;
  p.style.strokeWidth = strokeWidth;
  if (isSelected) p.classList.add('selected'); else p.classList.remove('selected');
}

function applyMapStyles(){
  var paths = $$map('#world-map .country.mapped');
  for (var i = 0; i < paths.length; i++) {
    styleCountry(paths[i], paths[i] === hoveredEl);
  }
}

/* ── Tooltip ─────────────────────────────────────────────────────── */
function showTooltip(e, target){
  var lang = state.lang, ui = getUI();
  var name = target.getAttribute('data-name') || '';
  var rid  = target.getAttribute('data-region');
  var region = rid ? regionById(rid) : null;
  var tt = $map('#map-tooltip');
  if(!tt) return;
  var html = '<div class="tt-name">'+esc(name)+'</div>';
  if(region){
    var regionName = lang==='ar' && region.ar_name ? region.ar_name : region.name;
    var n = regCountByRegion(rid);
    html += '<div class="tt-region" style="color:'+region.color+'">'+esc(regionName)+'</div>';
    html += '<div class="tt-count">'+n+' '+esc(ui.regulations)+'</div>';
  }
  tt.innerHTML = html;
  tt.style.display = 'block';
  positionTooltip(e);
}
function positionTooltip(e){
  var tt = $map('#map-tooltip');
  if(!tt) return;
  var wrap = tt.parentElement;
  var rect = wrap.getBoundingClientRect();
  var x = e.clientX - rect.left + 12;
  var y = e.clientY - rect.top + 12;
  var ttW = tt.offsetWidth, ttH = tt.offsetHeight;
  if(x + ttW > rect.width  - 8) x = e.clientX - rect.left - ttW - 12;
  if(y + ttH > rect.height - 8) y = e.clientY - rect.top  - ttH - 12;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
function hideTooltip(){
  var tt = $map('#map-tooltip');
  if(tt) tt.style.display = 'none';
}
function hideTooltipSafe(){ try { hideTooltip(); } catch(_){} }

function attachMapHandlers(){
  var map = $map('#world-map');
  if(!map) return;
  map.addEventListener('mousemove', function(e){
    var t = e.target;
    if(t && t.classList && t.classList.contains('mapped')){
      showTooltip(e, t);
      if (hoveredEl !== t) {
        if (hoveredEl) styleCountry(hoveredEl, false);
        hoveredEl = t;
        styleCountry(t, true);
      }
    } else {
      hideTooltip();
      if (hoveredEl) { styleCountry(hoveredEl, false); hoveredEl = null; }
    }
  });
  map.addEventListener('mouseleave', function(){
    hideTooltip();
    if (hoveredEl) { styleCountry(hoveredEl, false); hoveredEl = null; }
  });
}

function mapViewHTML(filtered, lang, ui){
  var selCount = (state.selectedRegions||[]).length;
  var hint = selCount
    ? (selCount + ' ' + esc(ui.regionsSelected))
    : esc(ui.clickMapHint);
  return '<div class="map-wrap">' +
           MAP_SVG_HTML +
           '<div id="map-tooltip" role="tooltip" aria-hidden="true"></div>' +
         '</div>' +
         '<p class="map-caption">'+hint+'</p>';
}


function render(){
  var ui = getUI();
  var lang = state.lang;
  var filtered = getFiltered();
  var regionCounts = countBy('region');
  var statusCounts = countBy('status');
  var hasFilter = state.selectedRegions.length || state.selectedTopics.length || state.selectedStatus.length || state.search;

  // Sidebar
  var side = '<nav class="rai-toc" aria-label="'+esc(ui.filters)+'">' +
    '<div class="rai-toc-heading" style="margin-bottom:4px">'+esc(ui.title)+'</div>' +
    '<div style="padding:0 16px 10px;font-size:11px;color:var(--text-dim)">' +
      REGS.length+' '+(lang==='ar'?'إطاراً عبر':'frameworks across')+' '+REGIONS.length+' '+(lang==='ar'?'ولاية':'jurisdictions') +
    '</div>' +
    '<hr class="rai-toc-divider"/>' +
    '<span class="rai-toc-label">'+esc(ui.jurisdictions)+'</span>';
  for(var i=0;i<REGIONS.length;i++){
    var r = REGIONS[i];
    var active = state.selectedRegions.indexOf(r.id)!==-1;
    var rn = lang==='ar' && r.ar_name ? r.ar_name : r.name;
    side += '<button class="rai-toc-item'+(active?' active':'')+'" data-filter-region="'+esc(r.id)+'">' +
      '<span class="rai-toc-dot" style="background:'+r.color+'"></span>' +
      '<span style="flex:1">'+esc(rn)+'</span>' +
      '<span class="rai-toc-count">'+(regionCounts[r.id]||0)+'</span>' +
    '</button>';
  }
  side += '<hr class="rai-toc-divider"/>' +
    '<span class="rai-toc-label">'+esc(ui.status)+'</span>';
  var sKeys = Object.keys(STATUS_CFG);
  for(var sj=0; sj<sKeys.length; sj++){
    var sk = sKeys[sj];
    var cfg = STATUS_CFG[sk];
    var count = statusCounts[sk] || 0;
    if(!count) continue;
    var sactive = state.selectedStatus.indexOf(sk)!==-1;
    var sl = lang==='ar' && cfg.ar_label ? cfg.ar_label : cfg.label;
    side += '<button class="rai-toc-item'+(sactive?' active':'')+'" data-filter-status="'+esc(sk)+'">' +
      '<span class="rai-toc-dot" style="background:'+cfg.color+'"></span>' +
      '<span style="flex:1">'+esc(sl)+'</span>' +
      '<span class="rai-toc-count">'+count+'</span>' +
    '</button>';
  }
  side += '<hr class="rai-toc-divider"/>' +
    '<span class="rai-toc-label">'+esc(ui.topics)+'</span>';
  for(var ti=0; ti<TOPICS.length; ti++){
    var t = TOPICS[ti];
    var tactive = state.selectedTopics.indexOf(t.id)!==-1;
    var tl = lang==='ar' && t.ar_label ? t.ar_label : t.label;
    side += '<button class="rai-toc-item'+(tactive?' active':'')+'" data-filter-topic="'+esc(t.id)+'">' +
      '<span class="rai-toc-dot" style="background:'+t.color+'"></span>' +
      '<span style="flex:1">'+esc(tl)+'</span>' +
    '</button>';
  }
  if(hasFilter){
    side += '<div style="padding:12px 16px 0"><button id="rai-clear-filters" class="rai-btn-small" style="width:100%">'+esc(ui.clearAll)+'</button></div>';
  }
  side += '<hr class="rai-toc-divider"/><span class="rai-toc-label">'+esc(ui.overview)+'</span>' +
    '<div style="padding:0 16px">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:10px">' +
        '<span style="font-size:12px;color:var(--text-dim)">'+esc(ui.totalFrameworks)+'</span>' +
        '<span style="font-size:13px;font-weight:700;color:var(--text)">'+REGS.length+'</span>' +
      '</div>';
  for(var ssj=0; ssj<sKeys.length; ssj++){
    var ssk = sKeys[ssj];
    var ccfg = STATUS_CFG[ssk];
    var ccount = statusCounts[ssk]||0;
    if(!ccount) continue;
    var ssl = lang==='ar' && ccfg.ar_label ? ccfg.ar_label : ccfg.label;
    var width = (ccount / REGS.length) * 100;
    side += '<div class="stat-bar-row">' +
      '<div class="stat-bar-track"><div class="stat-bar-fill" style="width:'+width+'%;background:'+ccfg.color+'"></div></div>' +
      '<span style="font-size:10px;color:'+ccfg.color+';font-weight:600;width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ssl)+'</span>' +
      '<span style="font-size:10px;color:var(--text-dim);width:14px;text-align:right">'+ccount+'</span>' +
    '</div>';
  }
  side += '</div></nav>';

  // Main content
  var selectedReg = state.selectedRegId ? regOf(state.selectedRegId) : null;
  var main = '<main class="rai-main">' +
    '<div class="rai-page-label">'+esc(ui.brand)+'</div>' +
    '<h1 class="rai-page-title">'+esc(ui.title)+'</h1>' +
    '<p class="rai-page-lead">'+esc(ui.subtitle)+'</p>' +
    '<p class="rai-page-asof">'+esc(ui.asOf)+'</p>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">' +
      '<p style="font-size:13px;color:var(--text-dim)">' +
        esc(ui.showing)+' <strong style="color:var(--text)">'+filtered.length+'</strong> '+esc(ui.of)+' '+REGS.length+' '+esc(ui.regulations) +
        ((state.view==='list' && !selectedReg) ? ' <span style="color:var(--text-dim);margin-left:8px">· '+esc(ui.clickForDetails)+'</span>' : '') +
      '</p>' +
      '<div style="display:flex;align-items:center;gap:8px">';
  if(state.view==='list'){
    main += '<div style="display:flex;gap:6px">' +
      '<button id="rai-sort-region" class="rai-btn-small'+(state.sortBy==='region'?' active':'')+'">'+esc(ui.sortByRegion)+'</button>' +
      '<button id="rai-sort-year" class="rai-btn-small'+(state.sortBy==='year'?' active':'')+'">'+esc(ui.sortByYear)+'</button>' +
    '</div>';
  }
  main += '<div class="rai-view-toggle">' +
      '<button id="rai-view-list" class="rai-view-btn'+(state.view==='list'?' active':'')+'">'+esc(ui.listView)+'</button>' +
      '<button id="rai-view-timeline" class="rai-view-btn'+(state.view==='timeline'?' active':'')+'">'+esc(ui.timelineView)+'</button>' +
      '<button id="rai-view-map" class="rai-view-btn'+(state.view==='map'?' active':'')+'">'+esc(ui.mapView)+'</button>' +
    '</div>' +
    '</div></div>';

  if(state.view==='timeline'){
    main += timelineHTML(filtered, lang);
  } else if(state.view==='map'){
    main += mapViewHTML(filtered, lang, ui);
  } else {
    main += '<div style="display:flex;gap:20px;align-items:flex-start">' +
      '<div style="flex:1;min-width:0">';
    if(filtered.length===0){
      main += '<div style="text-align:center;padding:48px 20px;color:var(--text-dim);border:1px solid var(--border-light);border-radius:var(--radius)">' +
        '<p style="font-size:14px;margin-bottom:10px">'+esc(ui.noResults)+'</p>' +
        '<button id="rai-clear-filters2" class="rai-btn-small">'+esc(ui.clearAll)+'</button>' +
      '</div>';
    } else {
      for(var fi=0; fi<filtered.length; fi++){
        main += regCardHTML(filtered[fi], selectedReg && selectedReg.id===filtered[fi].id, lang);
      }
    }
    main += '</div>';
    if(selectedReg){
      main += '<div class="reg-detail">'+detailPanelHTML(selectedReg, lang, ui)+'</div>';
    }
    main += '</div>';
  }
  main += '</main>';

  document.getElementById('root').innerHTML = '<div class="rai-layout">'+side+main+'</div>';
  // Map view: wire handlers + paint styles after DOM replace
  if(state.view==='map'){
    attachMapHandlers();
    applyMapStyles();
  } else {
    hoveredEl = null;
    hideTooltipSafe();
  }
}

/* ══════════════════════════════════════════
   EVENT DELEGATION
══════════════════════════════════════════ */
function toggleInArr(arr, v){
  var idx = arr.indexOf(v);
  if(idx===-1) arr.push(v); else arr.splice(idx,1);
}

document.addEventListener('click', function(e){
  var el = e.target;
  // filter buttons
  var fr = el.closest ? el.closest('[data-filter-region]') : null;
  if(fr){ toggleInArr(state.selectedRegions, fr.getAttribute('data-filter-region')); render(); return; }
  var fs = el.closest ? el.closest('[data-filter-status]') : null;
  if(fs){ toggleInArr(state.selectedStatus, fs.getAttribute('data-filter-status')); render(); return; }
  var ft = el.closest ? el.closest('[data-filter-topic]') : null;
  if(ft){ toggleInArr(state.selectedTopics, ft.getAttribute('data-filter-topic')); render(); return; }

  if(el.id==='rai-clear-filters' || el.id==='rai-clear-filters2'){
    state.selectedRegions = []; state.selectedTopics = []; state.selectedStatus = []; state.search = '';
    var inp = document.getElementById('rai-search-input'); if(inp) inp.value = '';
    render(); return;
  }

  if(el.id==='rai-view-list'){ state.view='list'; render(); return; }
  if(el.id==='rai-view-timeline'){ state.view='timeline'; state.selectedRegId = null; render(); return; }
  if(el.id==='rai-view-map'){ state.view='map'; state.selectedRegId = null; render(); return; }
  // Map region click: toggle region in the same selectedRegions array the sidebar drives
  if(el && el.classList && el.classList.contains('mapped') && el.getAttribute && el.getAttribute('data-region')){
    var _mrid = el.getAttribute('data-region');
    toggleInArr(state.selectedRegions, _mrid); render(); return;
  }
  if(el.id==='rai-sort-region'){ state.sortBy = state.sortBy==='region' ? null : 'region'; render(); return; }
  if(el.id==='rai-sort-year'){ state.sortBy = state.sortBy==='year' ? null : 'year'; render(); return; }
  if(el.id==='rai-detail-close'){ state.selectedRegId = null; render(); return; }

  // related chip
  var rel = el.closest ? el.closest('[data-rel-id]') : null;
  if(rel){ state.selectedRegId = rel.getAttribute('data-rel-id'); state.view='list'; render(); return; }

  // reg card click (incl. timeline buttons — both use data-reg-id)
  var rc = el.closest ? el.closest('[data-reg-id]') : null;
  if(rc){
    var rid = rc.getAttribute('data-reg-id');
    // timeline buttons: always open detail and switch to list
    if(state.view==='timeline'){
      state.selectedRegId = rid;
      state.view = 'list';
    } else {
      state.selectedRegId = (state.selectedRegId === rid) ? null : rid;
    }
    render(); return;
  }
});

// Keyboard: Enter/Space on focused reg card
document.addEventListener('keydown', function(e){
  if(e.key==='Enter' || e.key===' '){
    var el = document.activeElement;
    if(el && el.hasAttribute && el.hasAttribute('data-reg-id') && el.classList && el.classList.contains('reg-card')){
      e.preventDefault();
      var rid = el.getAttribute('data-reg-id');
      state.selectedRegId = (state.selectedRegId === rid) ? null : rid;
      render();
    }
  }
});

/* ══════════════════════════════════════════
   TOPBAR: LANG + THEME + SEARCH
══════════════════════════════════════════ */
function paintToggles(){
  var lang = state.lang;
  var theme = document.documentElement.dataset.theme || 'light';
  var langBtn = document.getElementById('rai-lang');
  var thmBtn  = document.getElementById('rai-thm');
  var brand   = document.getElementById('rai-brand');
  var search  = document.getElementById('rai-search-input');
  if(langBtn) langBtn.textContent = lang==='ar' ? 'EN' : 'AR';
  if(thmBtn)  thmBtn.textContent  = theme==='dark' ? 'Light' : 'Dark';
  if(brand)   brand.textContent   = (UI[lang]||UI.en).brand;
  if(search)  search.placeholder  = (UI[lang]||UI.en).searchPlaceholder;
  document.title = (UI[lang]||UI.en).title + ' · Responsible AI Toolkit';
  var skip = document.querySelector('.skip-link');
  if(skip) skip.textContent = lang==='ar' ? 'تخطى إلى المحتوى الرئيسي' : 'Skip to main content';
}

document.getElementById('rai-lang').addEventListener('click', function(){
  state.lang = state.lang==='ar' ? 'en' : 'ar';
  localStorage.setItem('rai-lang', state.lang);
  document.documentElement.lang = state.lang;
  document.documentElement.dir  = state.lang==='ar' ? 'rtl' : 'ltr';
  paintToggles();
  render();
});

document.getElementById('rai-thm').addEventListener('click', function(){
  var cur = document.documentElement.dataset.theme || 'light';
  var nxt = cur==='dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = nxt;
  localStorage.setItem('rai-theme', nxt);
  paintToggles();
});

document.getElementById('rai-search-input').addEventListener('input', function(e){
  state.search = e.target.value;
  render();
});

/* ── Boot ── */
paintToggles();
render();
</script>
