*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;font-size:14px;line-height:1.6}
.rai-topbar{background:var(--bg-sidebar);border-bottom:1px solid var(--border);padding:0 20px;height:44px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.rai-topbar-brand{font-size:12px;font-weight:600;color:var(--text-dim);letter-spacing:.3px}
.rai-topbar-right{display:flex;align-items:center;gap:8px}
.rai-btn-small{background:var(--bg-infobox);border:1px solid var(--border-light);color:var(--text-muted);border-radius:var(--radius);padding:4px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui);transition:border-color .15s,color .15s}
.rai-btn-small:hover{border-color:var(--accent);color:var(--accent)}
.rai-layout{display:grid;grid-template-columns:220px 1fr;gap:0;max-width:1380px;margin:0 auto;min-height:calc(100vh - 44px)}
.rai-toc{border-right:1px solid var(--border-light);padding:20px 0;position:sticky;top:44px;height:calc(100vh - 44px);overflow-y:auto}
[dir="rtl"] .rai-toc{border-right:none;border-left:1px solid var(--border-light)}
.rai-toc-heading{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;padding:0 16px;margin-bottom:6px;margin-top:14px}
.rai-toc-heading:first-child{margin-top:0}
.rai-toc-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border-left:3px solid transparent;font-size:13px;color:var(--text-muted);transition:all .12s;line-height:1.35}
.rai-toc-item:hover{background:var(--bg-hover);color:var(--text)}
.rai-toc-item.active{border-left-color:var(--accent);background:var(--bg-hover);color:var(--text-link);font-weight:600}
[dir="rtl"] .rai-toc-item{border-left:none;border-right:3px solid transparent}
[dir="rtl"] .rai-toc-item.active{border-right-color:var(--accent)}
.rai-toc-num{font-size:11px;color:var(--text-dim);min-width:16px}
.rai-toc-divider{border:none;border-top:1px solid var(--border-light);margin:10px 16px}
.rai-toc-meta{padding:6px 16px;font-size:12px;color:var(--text-dim)}
.rai-toc-progress-bar{height:4px;background:var(--border-light);border-radius:2px;margin:5px 16px 10px}
.rai-toc-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.rai-main{padding:24px 32px 60px;background:var(--bg-content);min-width:0}
.rai-page-label{display:inline-block;font-size:11px;font-weight:600;color:var(--text-link);background:var(--bg-hover);border:1px solid var(--border-blue);border-radius:var(--radius);padding:2px 8px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.rai-page-title{font-family:var(--font-ui);font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.25;border-bottom:1px solid var(--border);padding-bottom:8px}
.rai-page-lead{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.7;max-width:700px}
.rai-card{background:var(--bg-infobox);border:1px solid var(--border-light);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.rai-btn{border:1px solid var(--border);background:var(--bg-infobox);color:var(--text-muted);border-radius:var(--radius);padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-ui);transition:all .15s}
.rai-btn:hover{border-color:var(--accent);color:var(--accent)}
.rai-btn:disabled{opacity:.45;cursor:not-allowed}
.rai-btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.rai-btn-primary:hover{opacity:.9}
.rai-btn-primary:disabled{opacity:.4;cursor:not-allowed}
.q-card{background:var(--bg-infobox);border:1px solid var(--border-light);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.q-option{display:flex;align-items:flex-start;gap:10px;background:var(--bg-content);border:1px solid var(--border-light);border-radius:var(--radius);padding:9px 13px;cursor:pointer;transition:all .12s;margin-bottom:7px}
.q-option:hover{border-color:var(--border-blue);background:var(--bg-hover)}
.q-option.selected{border-color:var(--accent);background:var(--bg-hover)}
.q-option input[type=radio]{accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;margin-top:2px}
.score-ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.dim-bar{height:6px;background:var(--border-light);border-radius:2px;overflow:hidden;margin-top:6px}
.dim-fill{height:100%;border-radius:2px;transition:width .5s}
.section-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.section-tab{background:var(--bg-infobox);border:1px solid var(--border-light);border-radius:var(--radius);padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .12s}
.section-tab:hover{border-color:var(--accent);color:var(--accent)}
.section-tab.active{background:var(--bg-hover);border-color:var(--border-blue);color:var(--accent)}
@media(max-width:768px){.rai-layout{grid-template-columns:1fr}.rai-toc{display:none}.rai-main{padding:20px 16px}}
</style>

          { q:"هل لديك خطة استجابة موثقة للحوادث خاصة بإخفاقات الذكاء الاصطناعي؟", options:["لا توجد خطة استجابة للحوادث","خطة حوادث تقنية عامة موجودة لكنها لا تعالج إخفاقات الذكاء الاصطناعي","خطة خاصة بالذكاء الاصطناعي موجودة لكن لم تُختبَر أو تُمارَس","خطة مُختبَرة خاصة بالذكاء الاصطناعي مع أدوار وجداول زمنية واتصالات محددة"] },
          { q:"هل يستطيع المستخدمون المتأثرون الإبلاغ عن الأضرار أو الإشارة إلى سلوك غير متوقع من الذكاء الاصطناعي؟", options:["لا آلية للمستخدمين للإبلاغ عن الأضرار المرتبطة بالذكاء الاصطناعي","يمكن للمستخدمين تقديم ملاحظات عامة لكن لا إبلاغ خاص بأضرار الذكاء الاصطناعي","الإبلاغ عن الأضرار موجود لكن غير معلَن بشكل بارز أو مُراقَب","آلية إبلاغ واضحة وميسّرة مع مراقبة نشطة ومتابعة"] },
          { q:"كم يستغرق إيقاف نظام الذكاء الاصطناعي إذا اكتُشف ضرر جسيم؟", options:["لا يمكن إيقاف النظام بسهولة — يستلزم وقتاً طويلاً","الإيقاف ممكن لكنه يستغرق أياماً ويحتاج موافقات من المستويات العليا","يمكن إيقاف النظام خلال ساعات مع صلاحيات محددة","يوجد مفتاح إيقاف طارئ يستطيع الموظفون المعيَّنون تفعيله فوراً"] },
        ]
      },
    ]
  }
};

const SECTION_COLORS = ['var(--accent)','#0891b2','var(--purple)','var(--amber)','var(--green)','var(--red)','#ec4899','#f97316'];
const SECTION_WEIGHTS = [1.5, 1.0, 1.2, 1.0, 1.2, 1.0, 1.0, 1.0];

function getRiskLevel(score, lang) {
  const idx = score>=85?0:score>=70?1:score>=50?2:score>=30?3:4;
  const colors = ['var(--green)','var(--accent)','var(--amber)','#f97316','var(--red)'];
  return { ...T[lang].riskLevels[idx], color:colors[idx] };
}

function computeScores(answers, sections) {
  const sectionScores = sections.map((sec,si) => {
    const answered = sec.questions.filter((_,qi) => answers[`${si}_${qi}`] !== undefined);
    if (!answered.length) return 0;
    const total = answered.reduce((acc,_,qi) => acc + (answers[`${si}_${qi}`] ?? 0), 0);
    // score 0=worst(1pt) to 3=best(4pts) -> normalize
    const maxScore = answered.length * 3;
    return Math.round((total / maxScore) * 100);
  });
  const wSum   = sectionScores.reduce((a,s,i)=>a+s*SECTION_WEIGHTS[i],0);
  const wTotal = SECTION_WEIGHTS.reduce((a,w)=>a+w,0);
  return { sectionScores, overall:Math.round(wSum/wTotal) };
}

function ScoreRing({ score, color }) {
  const r=55, circ=2*Math.PI*r, fill=(score/100)*circ;
  return (
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r={r} fill="none" stroke="var(--border-light)" strokeWidth="9"/>
      <circle cx="65" cy="65" r={r} fill="none" stroke={color} strokeWidth="9"
        strokeDasharray={`${fill} ${circ}`} transform="rotate(-90 65 65)" strokeLinecap="round"/>
      <text x="65" y="61" textAnchor="middle" fill="var(--text)" fontSize="28" fontWeight="800" fontFamily="var(--font-ui)">{score}</text>
      <text x="65" y="77" textAnchor="middle" fill="var(--text-dim)" fontSize="11" fontFamily="var(--font-ui)">/ 100</text>
    </svg>
  );
}

function App() {
  const [lang, setLang]         = useState(document.documentElement.lang || 'en');
  const [screen, setScreen]     = useState('intro');
  const [sectionIdx, setSectionIdx] = useState(0);
  const [answers, setAnswers]   = useState({});

  useEffect(()=>{
    window.__raiSetLang = (l)=>{
      setLang(l);
      document.documentElement.lang=l;
      document.documentElement.dir=l==='ar'?'rtl':'ltr';
      const btn=document.getElementById('rai-lang');
      if(btn) btn.textContent=l==='ar'?'EN':'AR';
    };
  },[]);

  useEffect(()=>{
    if(screen==='results' && window.RAIGate){
      const {sectionScores, overall} = computeScores(answers, sections);
      const risk = getRiskLevel(overall, lang);
      const summary = sections.map((s,i)=>s.label+': '+Math.round(sectionScores[i])+'%').join(' | ');
      window.RAIGate.trigger({
        score:    Math.round(overall),
        maxScore: 100,
        tier:     risk.label,
        answers:  answers,
        summary:  summary,
      });
    }
  },[screen]);

  const T2 = T[lang];
  const sections = T2.sections;
  const totalQ = sections.reduce((a,s)=>a+s.questions.length,0);
  const answeredTotal = Object.keys(answers).length;

  function handleAnswer(si, qi, val){ setAnswers(p=>({...p,[`${si}_${qi}`]:val})); }
  function handleReset(){ setAnswers({}); setSectionIdx(0); setScreen('intro'); window.scrollTo({top:0}); if(window.RAIGate) window.RAIGate.reset(); }

  const sec = sections[sectionIdx];
  const secAnswered = sec?.questions.filter((_,qi)=>answers[`${sectionIdx}_${qi}`]!==undefined).length;
  const allSecAnswered = sec && secAnswered === sec.questions.length;

  /* RESULTS */
  if (screen==='results') {
    const { sectionScores, overall } = computeScores(answers, sections);
    const risk = getRiskLevel(overall, lang);
    const sorted = sections.map((s,i)=>({s,i,score:sectionScores[i]})).sort((a,b)=>a.score-b.score);
    const priority = sorted.slice(0,3).filter(x=>x.score<75);
    return (
      <div className="rai-layout">
        <nav className="rai-toc">
          <div className="rai-toc-heading">{T2.toolLabel}</div>
          <div className="rai-toc-meta">{T2.assessmentComplete}</div>
          <hr className="rai-toc-divider"/>
          {sections.map((s,i)=>(
            <div key={i} className="rai-toc-item" onClick={()=>{setSectionIdx(i);setScreen('section');}}>
              <span className="rai-toc-num">{i+1}</span>
              <span style={{flex:1}}>{s.title}</span>
              {sectionScores[i]>0&&<span style={{fontSize:11,color:SECTION_COLORS[i]}}>{sectionScores[i]}%</span>}
            </div>
          ))}
          <hr className="rai-toc-divider"/>
          <div style={{padding:'8px 16px'}}><button onClick={handleReset} className="rai-btn" style={{width:'100%'}}>{T2.retakeAssessment}</button></div>
        </nav>
        <main className="rai-main" style={{maxWidth:800}}>
          <div className="rai-page-label">{T2.brand}</div>
          <h1 className="rai-page-title">{T2.title}</h1>
          <div className="score-ring-wrap">
            <ScoreRing score={overall} color={risk.color}/>
            <span className="rai-btn" style={{marginTop:10,background:risk.color+'22',color:risk.color,borderColor:risk.color,cursor:'default',fontWeight:700,fontSize:14}}>{risk.label}</span>
            <p style={{fontSize:13,color:'var(--text-muted)',maxWidth:500,textAlign:'center',marginTop:8,lineHeight:1.6}}>{risk.desc}</p>
          </div>
          <h2 style={{fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:14}}>{T2.dimensionScores}</h2>
          <div style={{marginBottom:28}}>
            {sections.map((s,i)=>{
              const sr=sectionScores[i]; const r=getRiskLevel(sr,lang);
              return (
                <div key={i} className="rai-card" style={{marginBottom:10,padding:'13px 16px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{width:8,height:8,borderRadius:'50%',background:SECTION_COLORS[i],display:'inline-block',flexShrink:0}}/>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--text-sub)'}}>{s.title}</span>
                      {SECTION_WEIGHTS[i]>1&&<span style={{fontSize:10,color:'var(--accent)',fontWeight:700,background:'var(--bg-hover)',borderRadius:2,padding:'1px 7px',border:'1px solid var(--border-blue)'}}>{SECTION_WEIGHTS[i]}× {T2.weight}</span>}
                    </div>
                    <span style={{fontSize:13,fontWeight:800,color:r.color}}>{sr}/100</span>
                  </div>
                  <div className="dim-bar"><div className="dim-fill" style={{width:sr+'%',background:r.color}}/></div>
                </div>
              );
            })}
          </div>
          {priority.length>0&&(
            <>
              <h2 style={{fontSize:16,fontWeight:700,color:'var(--text)',marginBottom:14}}>{T2.priorityAreas}</h2>
              <div style={{marginBottom:28}}>
                {priority.map(({s,i,score})=>(
                  <div key={i} className="rai-card" style={{borderLeft:'3px solid '+SECTION_COLORS[i],marginBottom:10}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <span style={{fontSize:13,fontWeight:700,color:SECTION_COLORS[i]}}>{s.title}</span>
                      <span style={{marginInlineStart:'auto',fontSize:12,fontWeight:800,color:getRiskLevel(score,lang).color}}>{score}/100</span>
                    </div>
                    <p style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.6}}>{s.rec}</p>
                  </div>
                ))}
              </div>
            </>
          )}
          <div className="rai-card" style={{background:'var(--bg-hover)',border:'1px solid var(--border-blue)',marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:6}}>{T2.aboutAssessment}</div>
            <p style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.7}}>{T2.aboutText}</p>
          </div>
          <button onClick={handleReset} className="rai-btn">{T2.retakeAssessment}</button>
        </main>
      </div>
    );
  }

  /* INTRO */
  if (screen==='intro') return (
    <div className="rai-layout">
      <nav className="rai-toc">
        <div className="rai-toc-heading">{T2.toolLabel}</div>
        <hr className="rai-toc-divider"/>
        {sections.map((s,i)=>(
          <div key={i} className="rai-toc-item" onClick={()=>{setSectionIdx(i);setScreen('section');}}>
            <span className="rai-toc-num">{i+1}</span><span>{s.title}</span>
          </div>
        ))}
        <hr className="rai-toc-divider"/>
        <div className="rai-toc-meta">{T2.questions} · {T2.dimensions}</div>
      </nav>
      <main className="rai-main">
        <div className="rai-page-label">{T2.brand}</div>
        <h1 className="rai-page-title">{T2.title}</h1>
        <p className="rai-page-lead">{T2.lead}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:12,marginBottom:24}}>
          {sections.map((s,i)=>(
            <div key={i} className="rai-card" style={{borderLeft:'3px solid '+SECTION_COLORS[i],cursor:'pointer'}} onClick={()=>{setSectionIdx(i);setScreen('section');}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:SECTION_COLORS[i],display:'inline-block',marginBottom:6}}/>
              <div style={{fontSize:13,fontWeight:700,color:'var(--text)',marginBottom:3}}>{s.title}</div>
              <div style={{fontSize:12,color:'var(--text-dim)'}}>{s.questions.length} {T2.questions.split(' ')[0]}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <button onClick={()=>{setSectionIdx(0);setScreen('section');}} className="rai-btn rai-btn-primary" style={{padding:'9px 22px',fontSize:14}}>{T2.startAssessment} →</button>
          <span style={{fontSize:13,color:'var(--text-dim)'}}>{T2.minutes} · {T2.questions} · {T2.dimensions}</span>
        </div>
      </main>
    </div>
  );

  /* SECTION VIEW */
  const progress = Math.round(((sectionIdx + secAnswered/sec.questions.length)/sections.length)*100);
  return (
    <div className="rai-layout">
      <nav className="rai-toc">
        <div className="rai-toc-heading">{T2.toolLabel}</div>
        <div className="rai-toc-meta">{answeredTotal}/{totalQ} {T2.answered}</div>
        <div className="rai-toc-progress-bar"><div className="rai-toc-progress-fill" style={{width:progress+'%'}}/></div>
        <hr className="rai-toc-divider"/>
        {sections.map((s,i)=>(
          <div key={i} className={`rai-toc-item${i===sectionIdx?' active':''}`} onClick={()=>setSectionIdx(i)}>
            <span className="rai-toc-num">{i+1}</span>
            <span style={{flex:1}}>{s.title}</span>
            {s.questions.every((_,qi)=>answers[`${i}_${qi}`]!==undefined)&&<span style={{color:'var(--green)',fontSize:11}}>✓</span>}
          </div>
        ))}
        <hr className="rai-toc-divider"/>
        <div style={{padding:'8px 16px'}}>
          <button onClick={()=>setScreen('results')} className="rai-btn rai-btn-primary" style={{width:'100%'}}>{T2.viewResults}</button>
        </div>
      </nav>
      <main className="rai-main">
        <div className="rai-page-label">{T2.section} {sectionIdx+1} {T2.of} {sections.length}</div>
        <h2 className="rai-page-title" style={{color:SECTION_COLORS[sectionIdx]}}>{sec.title}</h2>
        <p className="rai-page-lead">{sec.description}</p>
        <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:16}}>{secAnswered}/{sec.questions.length} {T2.answered}</div>

        {sec.questions.map((q,qi)=>{
          const val = answers[`${sectionIdx}_${qi}`];
          return (
            <div key={qi} className="q-card">
              <p style={{fontSize:14,fontWeight:600,color:'var(--text-sub)',marginBottom:12,lineHeight:1.5}}>
                <span style={{color:'var(--text-dim)',fontWeight:400}}>Q{qi+1} · </span>{q.q}
              </p>
              {q.options.map((opt,oi)=>(
                <div key={oi} className={`q-option${val===oi?' selected':''}`} onClick={()=>handleAnswer(sectionIdx,qi,oi)}>
                  <input type="radio" readOnly checked={val===oi} style={{marginTop:2}}/>
                  <div style={{flex:1}}>
                    <span style={{fontSize:11,fontWeight:700,color:val===oi?'var(--accent)':'var(--text-dim)',marginInlineEnd:8,textTransform:'uppercase',letterSpacing:'.04em'}}>{String.fromCharCode(65+oi)}</span>
                    <span style={{fontSize:13,color:val===oi?'var(--text)':'var(--text-muted)',lineHeight:1.5}}>{opt}</span>
                  </div>
                  {val===oi&&<span style={{color:'var(--green)',fontSize:14,flexShrink:0}}>✓</span>}
                </div>
              ))}
            </div>
          );
        })}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12,gap:10,flexWrap:'wrap'}}>
          {sectionIdx>0
            ? <button onClick={()=>setSectionIdx(i=>i-1)} className="rai-btn">← {T2.back}</button>
            : <div/>}
          {sectionIdx<sections.length-1
            ? <button onClick={()=>{if(allSecAnswered)setSectionIdx(i=>i+1);window.scrollTo({top:0});}} className="rai-btn rai-btn-primary" disabled={!allSecAnswered}>{T2.nextSection} {sections[sectionIdx+1]?.title} →</button>
            : <button onClick={()=>setScreen('results')} className="rai-btn rai-btn-primary" disabled={!allSecAnswered}>{T2.viewMyResults} →</button>
          }
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="./gate.js"></script>
<script>
RAIGate.init({
  linkedInUrl: 'https://www.linkedin.com/in/abbas-al-mahdi/',
  toolNameEn:  'AI Risk Assessment Scorecard',
  toolNameAr:  'بطاقة تقييم مخاطر الذكاء الاصطناعي',
});
</script>
</body>
</html>
