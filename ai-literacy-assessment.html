.rai-page-label{display:inline-block;font-size:11px;font-weight:600;color:var(--text-link);background:var(--bg-hover);border:1px solid var(--border-blue);border-radius:var(--radius);padding:2px 8px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getTier(pct) {
  return LITERACY_TIERS.find(t => pct >= t.min) || LITERACY_TIERS[LITERACY_TIERS.length-1];
}
function calcDomainScore(domainId, answers) {
  const qs = INDIVIDUAL_QUESTIONS.filter(q => q.domain === domainId);
  if (!qs.length) return null;
  const ans = qs.filter(q => answers[q.id] !== undefined);
  if (!ans.length) return null;
  const correct = ans.filter(q => { const s=answers[q.id]; return s!=null && q.options[s]?.correct; }).length;
  return Math.round((correct/qs.length)*100);
}
function abbr(label) {
  return (label||'').split(/\s+/).filter(w=>/^[A-Za-z]/.test(w)).map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

// ── RADAR CHART ───────────────────────────────────────────────────────────────
function RadarChart({ scores }) {
  const cx=130,cy=130,r=95,n=DOMAINS.length;
  const pts=DOMAINS.map((d,i)=>{
    const a=(Math.PI*2*i/n)-Math.PI/2,pct=(scores[d.id]??0)/100;
    return {x:cx+r*pct*Math.cos(a),y:cy+r*pct*Math.sin(a),lx:cx+(r+22)*Math.cos(a),ly:cy+(r+22)*Math.sin(a),color:d.color,lab:d.label.split(' ')[0]};
  });
  return (
    <svg width="260" height="260" viewBox="0 0 260 260">
      {[.25,.5,.75,1].map(lv=>{
        const gp=DOMAINS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return `${cx+r*lv*Math.cos(a)},${cy+r*lv*Math.sin(a)}`;}).join(' ');
        return <polygon key={lv} points={gp} fill="none" stroke="var(--border-light)" strokeWidth="1"/>;
      })}
      {DOMAINS.map((_,i)=>{const a=(Math.PI*2*i/n)-Math.PI/2;return <line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="var(--border-light)" strokeWidth="1"/>;
      })}
      <polygon points={pts.map(p=>`${p.x},${p.y}`).join(' ')} fill="#3366cc22" stroke="#3366cc" strokeWidth="2"/>
      {pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={3} fill={DOMAINS[i].color}/>)}
      {pts.map((p,i)=><text key={i} x={p.lx} y={p.ly} textAnchor="middle" dominantBaseline="middle" fontSize="9" fontWeight="700" fill={DOMAINS[i].color}>{p.lab}</text>)}
    </svg>
  );
}

          {q.options.map((opt,idx)=>{
            let bc='var(--border)',bg='var(--bg-infobox)',col='var(--text-sub)';
            if(done){if(opt.correct){bg='var(--green-bg)';bc='var(--green)';col='var(--green)';}else if(idx===sel){bg='var(--red-bg)';bc='var(--red)';col='var(--red)';}}
            return (
              <button key={idx} onClick={()=>pick(idx)} disabled={done} style={{background:bg,border:'1px solid '+bc,color:col,borderRadius:'var(--radius)',padding:'11px 14px',textAlign:'start',cursor:done?'default':'pointer',fontSize:13,lineHeight:1.5,fontFamily:'var(--font-ui)',transition:'all .15s',width:'100%'}}>
                <span style={{fontWeight:700,marginRight:8,color:done&&opt.correct?'var(--green)':done&&idx===sel&&!opt.correct?'var(--red)':'var(--text-dim)'}}>{String.fromCharCode(65+idx)}.</span>
                {L(opt.text, opt.text_ar)}
                {done&&opt.correct&&<span style={{marginLeft:6,fontWeight:700}}>✓</span>}
                {done&&idx===sel&&!opt.correct&&<span style={{marginLeft:6,fontWeight:700}}>✗</span>}
              </button>
            );
          })}
        </div>
      </div>
      {showE&&<div className="rai-card" style={{marginBottom:14,borderColor:done&&q.options[sel]?.correct?'var(--green)':'var(--red)'}}>
        <p style={{fontSize:11,fontWeight:700,color:done&&q.options[sel]?.correct?'var(--green)':'var(--red)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.5px'}}>
          {done&&q.options[sel]?.correct?`\u2713 ${T2.correctLabel}`:`\u2715 ${T2.incorrectLabel}`}{'—'}{T2.explanationLabel}
        </p>
        <p style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.65}}>{L(q.explanation, q.explanation_ar)}</p>
      </div>}
      {done&&<div style={{textAlign:'end'}}><button onClick={next} className="rai-btn rai-btn-primary">{last?T2.seeResults:T2.nextQuestion}</button></div>}
    </div>
  );
}

// ── ENTERPRISE ────────────────────────────────────────────────────────────────

    const y=a.filter(it=>answers[it.id]==='yes').length,p=a.filter(it=>answers[it.id]==='partial').length;
    return Math.round(((y+p*0.5)/domain.items.length)*100);
  }
  if(view==='results'){
    const sc={};for(const d of ENTERPRISE_DOMAINS){sc[d.id]=calcED(d);}
    const allScores=ENTERPRISE_DOMAINS.map(d=>sc[d.id]??0);
    const ov=Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length);
    const tier=getTier(ov);
    const gaps=all.filter(it=>answers[it.id]==='no');
    return (
      <div>
        <div style={{marginBottom:20}}>

            <span style={{fontSize:40,fontWeight:900,color:tier.color,fontFamily:'var(--font-ui)'}}>{ov}%</span>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:tier.color}}>{L(tier.label, tier.labelAr)}</div>
              <div style={{fontSize:11,color:'var(--text-dim)'}}>{T2.orgLiteracy}</div>

          </div>
          <p style={{fontSize:13,color:'var(--text-muted)',maxWidth:420,margin:'0 auto'}}>{L(tier.desc, tier.descAr)}</p>
          <p style={{fontSize:11,color:'var(--text-dim)',marginTop:6}}>{L('Informed by the UNESCO AI Competency Framework for Citizens (2024)','مستوحى من إطار اليونسكو لكفاءات الذكاء الاصطناعي للمواطنين (2024)')}</p>
        </div>

          <h3 style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:14}}>{T2.domainBreakdown}</h3>
          {ENTERPRISE_DOMAINS.map(d=>{
            const s=sc[d.id],srl=s!==null?getTier(s):null;
            return (
              <div key={d.id} style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,alignItems:'center'}}>

                    <span className="cat-icon" style={{background:d.color,width:20,height:20,fontSize:8}}>{abbr(d.label)}</span>
                    <span style={{fontSize:13,color:'var(--text-sub)',fontWeight:600}}>{dLabel(d,T2)}</span>

          <h3 style={{fontSize:14,fontWeight:700,color:'var(--red)',marginBottom:12,display:'flex',alignItems:'center',gap:6}}>

              const par=ENTERPRISE_DOMAINS.find(d=>d.items.some(i=>i.id===it.id));

                      ))}
                    </div>

                );
              })}

          </div>
        );
      })}
      <div style={{textAlign:'center',paddingTop:12}}>
        <button onClick={()=>setView('results')} className="rai-btn rai-btn-primary" style={{padding:'11px 24px'}} disabled={doneCount<all.length}>{doneCount<all.length?`${T2.viewFullResults} (${doneCount}/${all.length})`:T2.viewFullResults}</button>
      </div>
    </div>
  );
}

    setLang(newLang);

          {T2.modeEnterprise}
        </div>
        <hr className="rai-toc-divider"/>
        <div className="rai-toc-heading">{T2.domainsHeading}</div>
        {tocD.map(d=>{
          const sc=mode==='individual'&&qDone?ds[d.id]:mode==='enterprise'?calcEP(d):null;
          return (
            <div key={d.id} className="rai-toc-item" style={{cursor:'default'}}>
              <span className="cat-icon" style={{background:d.color,width:18,height:18,fontSize:7,flexShrink:0}}>{abbr(d.label)}</span>
              <span style={{flex:1,lineHeight:1.3,fontSize:12}}>{dLabel(d,T2)}</span>
              {sc!==null&&sc!==undefined&&<span style={{fontSize:10,fontWeight:700,color:sc>=70?'var(--green)':sc>=50?'var(--amber)':'var(--red)'}}>{sc}%</span>}
            </div>
          );
        })}
      </nav>
      <main className="rai-main">
        {mode==='individual'&&qDone
          ?<IndividualResults answers={qAns} onReset={reset} T2={T2}/>
          :mode==='individual'
          ?<IndividualQuiz onComplete={a=>{setQAns(a);setQDone(true);}} T2={T2}/>
          :mode==='enterprise'
          ?<EnterpriseAssessment answers={eAns} setAnswers={setEAns} view={eView} setView={setEView} onReset={reset} T2={T2}/>
          :<Landing setMode={setMode} T2={T2}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
